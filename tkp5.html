let db = [], ans = {}, cur = 0, time = 60 * 60;

    function startTest() {
        const n = document.getElementById('inName').value.trim();
        if(n.length < 3) return alert("Harap masukkan nama lengkap!");
        // Acak soal agar tidak bosan
        db = [...bank].sort(() => Math.random() - 0.5);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('test-screen').style.display = 'block';
        initNav(); show(); startTimer();
    }

    function startTimer() {
        const intv = setInterval(() => {
            if(time <= 0) { clearInterval(intv); finish(); }
            time--;
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
        }, 1000);
    }

    function initNav() {
        const g = document.getElementById('nav-grid');
        db.forEach((_,i) => {
            const d = document.createElement('div');
            d.className = 'nav-item'; d.id = `nav-${i}`; d.innerText = i+1;
            d.onclick = () => { cur = i; show(); };
            g.appendChild(d);
        });
    }

    function show() {
        const s = db[cur];
        document.getElementById('q-meta').innerText = `SOAL ${cur+1} | KATEGORI: ${s.cat.toUpperCase()}`;
        document.getElementById('q-text').innerText = s.q;
        
        let h = "";
        const lbl = ['A', 'B', 'C', 'D', 'E'];
        s.opts.forEach((o, idx) => {
            const isSel = ans[cur]?.text === o.t ? 'selected' : '';
            h += `<div class="opt ${isSel}" onclick="hit('${o.t}', ${o.s})"><b>${lbl[idx]}.</b> &nbsp; ${o.t}</div>`;
        });
        document.getElementById('options').innerHTML = h;

        const bN = document.getElementById('btn-next');
        if(cur === db.length - 1) {
            bN.innerText = "SELESAI"; bN.style.background = "#22c55e";
            bN.onclick = finish;
        } else {
            bN.innerText = "Selanjutnya"; bN.style.background = "var(--prc)";
            bN.onclick = () => nav(1);
        }

        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${cur}`).classList.add('active');
    }

    // FUNGSI HIT DENGAN AUTO-NEXT
    function hit(t, s) {
        ans[cur] = {text: t, score: s};
        document.getElementById(`nav-${cur}`).classList.add('filled');
        show(); // Update tampilan pilihan terpilih

        // Jika bukan soal terakhir, pindah otomatis setelah 300ms
        if(cur < db.length - 1) {
            setTimeout(() => {
                nav(1);
            }, 300); 
        }
    }

    function nav(d) {
        let t = cur + d;
        if(t >= 0 && t < db.length) { cur = t; show(); }
    }

    function finish() {
        if(!confirm("Kirim jawaban sekarang?")) return;
        let total = 0, rows = "";
        db.forEach((s, i) => {
            const a = ans[i] || {text: "-", score: 0};
            total += a.score;
            rows += `<tr><td>${i+1}</td><td>${s.q.substring(0, 70)}...</td><td>${a.score}</td></tr>`;
        });

        document.getElementById('score-val').innerText = total;
        document.getElementById('name-label').innerText = document.getElementById('inName').value;
        document.getElementById('table-body').innerHTML = rows;
        
        const st = document.getElementById('final-status');
        st.innerText = total >= 180 ? "CUKUP MEMAHAMI MATERI" : "KURANG MEMAHAMI MATERI";
        st.style.color = total >= 180 ? "green" : "red";

        // Kirim data ke Google Sheets
        const fd = new FormData();
        fd.append("nama", document.getElementById('inName').value);
        fd.append("skorMurni", total);
        fetch(webAppUrl, { method: "POST", mode: "no-cors", body: fd });

        document.getElementById('test-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-content');
        html2pdf().from(element).save(`Hasil_TKP_50_${document.getElementById('inName').value}.pdf`);
    }
</script>
